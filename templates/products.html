{% extends "base.html" %}
{% block title %}Products – Irish Grown{% endblock %}

{% block scripts %}
{{ super() }}
<style>
  .products-page { max-width: 1100px; margin: 0 auto; padding: 32px 16px 60px; }
  .products-page > * { margin-left: 0 !important; margin-right: 0 !important; }

  .products-hero {
    background: linear-gradient(135deg, #0a7a38 0%, #14a356 55%, #1bc467 100%);
    border-radius: 20px; padding: 44px 40px; text-align: center;
    position: relative; overflow: hidden; margin-bottom: 28px;
  }
  .products-hero::before {
    content:''; position:absolute; top:-40%; left:-20%;
    width:160%; height:160%;
    background:radial-gradient(circle at 60% 40%, rgba(255,255,255,0.07) 0%, transparent 55%);
    pointer-events:none;
  }
  .products-hero h1 { font-size:2.2rem; margin:0 0 8px; }
  .products-hero p  { font-size:1rem; color:rgba(255,255,255,0.85); margin:0; }

  .filter-bar {
    background:rgba(4,28,12,0.82); backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.12); border-radius:16px;
    padding:18px 24px; display:flex; gap:14px; align-items:flex-end;
    flex-wrap:wrap; margin-bottom:20px;
  }
  .filter-bar > * { margin:0 !important; }
  .filter-group { display:flex; flex-direction:column; gap:5px; }
  .filter-group label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,0.45); }
  .filter-input, .filter-select {
    padding:9px 14px; background:rgba(255,255,255,0.07);
    border:1.5px solid rgba(255,255,255,0.14); border-radius:10px;
    color:white; font-family:inherit; font-size:0.9rem; min-width:180px;
  }
  .filter-input::placeholder { color:rgba(255,255,255,0.28); }
  .filter-input:focus, .filter-select:focus { outline:none; border-color:#1bc467; }
  .filter-select option { background:#041c0a; color:white; }
  .filter-clear {
    padding:9px 18px; background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15); border-radius:10px;
    color:rgba(255,255,255,0.6); font-family:inherit; font-size:0.88rem;
    cursor:pointer; transition:background 0.15s,color 0.15s; align-self:flex-end;
  }
  .filter-clear:hover { background:rgba(255,255,255,0.14); color:white; }

  .results-bar {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:16px; flex-wrap:wrap; gap:10px;
  }
  .results-bar > * { margin:0 !important; }
  #results-count { font-size:0.88rem; color:rgba(255,255,255,0.45); }
  .sort-select {
    padding:7px 12px; background:rgba(255,255,255,0.07);
    border:1.5px solid rgba(255,255,255,0.14); border-radius:9px;
    color:white; font-family:inherit; font-size:0.88rem; cursor:pointer;
  }
  .sort-select option { background:#041c0a; }
  .sort-select:focus { outline:none; border-color:#1bc467; }

  .products-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap:20px;
  }

  .product-card {
    background:rgba(4,20,10,0.88); border:1px solid rgba(255,255,255,0.09);
    border-radius:16px; overflow:hidden; display:flex; flex-direction:column;
    transition:transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  }
  .product-card:hover {
    transform:translateY(-3px);
    box-shadow:0 12px 40px rgba(0,0,0,0.45);
    border-color:rgba(27,196,103,0.3);
  }
  .product-card-img {
    width:100%; aspect-ratio:4/3; object-fit:cover;
    background:rgba(255,255,255,0.04);
  }
  .product-card-body { padding:14px 16px; flex:1; display:flex; flex-direction:column; gap:6px; }
  .product-card-cat {
    font-size:0.68rem; font-weight:700; text-transform:uppercase;
    letter-spacing:1px; color:#1bc467;
  }
  .product-card-name {
    font-size:0.97rem; font-weight:700; line-height:1.3; margin:0;
    color:white;
  }
  .product-card-producer {
    font-size:0.77rem; color:rgba(255,255,255,0.45);
    text-decoration:none; transition:color 0.15s;
  }
  .product-card-producer:hover { color:#4cd98a; }
  .product-card-desc {
    font-size:0.82rem; color:rgba(255,255,255,0.5); line-height:1.5;
    flex:1; margin-top:2px;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .product-card-footer {
    padding:12px 16px 16px; display:flex; flex-direction:column; gap:8px;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .product-card-footer-top { display:flex; align-items:center; gap:8px; }
  .product-card-footer-actions { display:flex; align-items:center; gap:8px; }
  .product-card-price { font-size:1.1rem; font-weight:800; color:#4cd98a; flex:1; }
  .qty-input-small {
    width:52px; padding:7px 8px; text-align:center;
    background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.14);
    border-radius:8px; color:white; font-family:inherit; font-size:0.88rem;
  }
  .qty-input-small:focus { outline:none; border-color:#1bc467; }
  .product-card-footer-actions .add-cart-btn:only-child { flex:1; }
  .add-cart-btn {
    flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
    padding:9px 12px; border:none; border-radius:9px;
    background:linear-gradient(135deg,#14a356 0%,#1bc467 100%);
    color:white; font-family:inherit; font-size:0.85rem; font-weight:700;
    cursor:pointer; transition:transform 0.15s, filter 0.15s, box-shadow 0.15s;
    white-space:nowrap;
  }
  .add-cart-btn:hover { transform:translateY(-1px); filter:brightness(1.08); box-shadow:0 4px 14px rgba(20,163,86,0.35); }
  .add-cart-btn:disabled { opacity:0.5; transform:none; cursor:not-allowed; filter:none; }
  .add-cart-btn svg { width:14px; height:14px; stroke:white; fill:none; stroke-width:2.5; }
  .stock-badge {
    font-size:0.7rem; font-weight:600; padding:2px 8px;
    border-radius:20px; white-space:nowrap;
  }
  .stock-in  { color:#4cd98a; background:rgba(76,217,138,0.12); }
  .stock-low { color:#f5c542; background:rgba(245,197,66,0.12); }
  .stock-out { color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.07); }

  .no-results {
    grid-column:1/-1; text-align:center; padding:60px 20px;
    color:rgba(255,255,255,0.35);
  }
  .no-results svg { width:56px; height:56px; stroke:rgba(255,255,255,0.2); fill:none; stroke-width:1.2; margin-bottom:14px; }
  .no-results p { font-size:1rem; margin:0 0 6px; }
  .no-results small { font-size:0.83rem; }

  .page-loading { text-align:center; padding:60px 20px; color:rgba(255,255,255,0.35); font-size:0.95rem; }

  @media (max-width: 600px) {
    .products-hero { padding:32px 24px; }
    .products-hero h1 { font-size:1.7rem; }
    .filter-bar { flex-direction:column; align-items:stretch; }
    .filter-input, .filter-select { min-width:0; width:100%; }
  }
</style>
{% endblock %}

{% block body_content %}
<div class="products-page">

  <div class="products-hero">
    <h1>Fresh Irish Products</h1>
    <p>Directly from local producers — seasonal, sustainable, and always fresh.</p>
  </div>

  <div class="filter-bar">
    <div class="filter-group" style="flex:1;min-width:180px;">
      <label>Search</label>
      <input class="filter-input" id="search-input" type="search" placeholder="e.g. eggs, honey, cheese…" autocomplete="off" />
    </div>
    <div class="filter-group">
      <label>Category</label>
      <select class="filter-select" id="cat-select">
        <option value="">All categories</option>
      </select>
    </div>
    <div class="filter-group">
      <label>County</label>
      <select class="filter-select" id="county-select">
        <option value="">All counties</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Availability</label>
      <select class="filter-select" id="avail-select">
        <option value="">All products</option>
        <option value="in">In stock</option>
        <option value="out">Out of stock</option>
      </select>
    </div>
    <button class="filter-clear" onclick="clearFilters()">Clear filters</button>
  </div>

  <div class="results-bar">
    <span id="results-count"></span>
    <select class="sort-select" id="sort-select">
      <option value="default">Sort: Default</option>
      <option value="price_asc">Price: Low to High</option>
      <option value="price_desc">Price: High to Low</option>
      <option value="name_asc">Name: A–Z</option>
      <option value="name_desc">Name: Z–A</option>
    </select>
  </div>

  <div class="products-grid" id="products-grid">
    <div class="page-loading">Loading products…</div>
  </div>

</div>

<script>
/* ── Data & state ─────────────────────────────────────────── */
let _allCards = [];   // populated after fetch

function _esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Render a single product card ─────────────────────────── */
function _renderProductCard(p) {
  const stock = parseInt(p.stock) || 0;
  const stockBadge = stock > 5
    ? `<span class="stock-badge stock-in">● In stock</span>`
    : stock > 0
      ? `<span class="stock-badge stock-low">● ${stock} left</span>`
      : '';
  const footerAction = stock > 0
    ? `<input class="qty-input-small" type="number" id="qty-${p.id}" value="1" min="1" max="${stock}" />
       <button class="add-cart-btn" onclick="addToCart(${p.id},'qty-${p.id}',this)">
         <i data-lucide="shopping-basket"></i> Add
       </button>`
    : `<button class="add-cart-btn" disabled>Out of Stock</button>`;

  const div = document.createElement('div');
  div.className = 'product-card';
  div.dataset.id       = p.id;
  div.dataset.name     = (p.name || '').toLowerCase();
  div.dataset.category = p.category || '';
  div.dataset.price    = p.price || 0;
  div.dataset.stock    = stock;
  div.dataset.producer = (p.producer_display || '').toLowerCase();
  div.dataset.county   = p.producer_county || '';
  div.innerHTML = `
    <img class="product-card-img"
         src="/static/${_esc(p.image || '')}"
         alt="${_esc(p.name)}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="product-card-img" style="display:none;align-items:center;justify-content:center;aspect-ratio:4/3;background:linear-gradient(135deg,#0a4a22,#0e6b30)"><i data-lucide="image"></i></div>
    <div class="product-card-body">
      ${p.category ? `<span class="product-card-cat">${_esc(p.category)}</span>` : ''}
      <p class="product-card-name">${_esc(p.name)}</p>
      ${p.producer ? `<a class="product-card-producer" href="/producers/${_esc(p.producer)}">${_esc(p.producer_display || p.producer)}</a>` : ''}
      ${p.description ? `<p class="product-card-desc">${_esc(p.description)}</p>` : ''}
    </div>
    <div class="product-card-footer">
      <div class="product-card-footer-top">
        <span class="product-card-price">€${parseFloat(p.price || 0).toFixed(2)}</span>
        ${stockBadge}
      </div>
      <div class="product-card-footer-actions">${footerAction}</div>
    </div>`;
  return div;
}

/* ── Filter + sort ────────────────────────────────────────── */
function applyFilters() {
  const q      = document.getElementById('search-input').value.toLowerCase().trim();
  const cat    = document.getElementById('cat-select').value;
  const county = document.getElementById('county-select').value;
  const avail  = document.getElementById('avail-select').value;
  const sort   = document.getElementById('sort-select').value;

  let visible = _allCards.filter(c => {
    const matchQ      = !q || c.dataset.name.includes(q) || c.dataset.producer.includes(q);
    const matchCat    = !cat || c.dataset.category === cat;
    const matchCounty = !county || c.dataset.county === county;
    const stock       = parseInt(c.dataset.stock) || 0;
    const matchAvail  = !avail
      || (avail === 'in'  && stock > 0)
      || (avail === 'out' && stock === 0);
    return matchQ && matchCat && matchCounty && matchAvail;
  });

  visible.sort((a, b) => {
    if (sort === 'price_asc')  return parseFloat(a.dataset.price) - parseFloat(b.dataset.price);
    if (sort === 'price_desc') return parseFloat(b.dataset.price) - parseFloat(a.dataset.price);
    if (sort === 'name_asc')   return a.dataset.name.localeCompare(b.dataset.name);
    if (sort === 'name_desc')  return b.dataset.name.localeCompare(a.dataset.name);
    return 0;
  });

  const hidden = new Set(_allCards.filter(c => !visible.includes(c)));
  hidden.forEach(c => { c.style.display = 'none'; });

  const grid = document.getElementById('products-grid');
  visible.forEach(c => { c.style.display = ''; grid.appendChild(c); });

  document.getElementById('results-count').textContent =
    `${visible.length} product${visible.length !== 1 ? 's' : ''} found`;

  const existing = document.getElementById('no-results-msg');
  if (existing) existing.remove();
  if (visible.length === 0) {
    grid.insertAdjacentHTML('afterbegin',
      `<div class="no-results" id="no-results-msg">
         <i data-lucide="search-x"></i>
         <p>No products match your filters.</p>
         <small>Try a different search term or clear the filters.</small>
       </div>`);
    lucide.createIcons();
  }
}

function clearFilters() {
  document.getElementById('search-input').value  = '';
  document.getElementById('cat-select').value    = '';
  document.getElementById('county-select').value = '';
  document.getElementById('avail-select').value  = '';
  document.getElementById('sort-select').value   = 'default';
  applyFilters();
}

/* ── Fetch & initialise ───────────────────────────────────── */
async function loadProducts() {
  const grid = document.getElementById('products-grid');
  try {
    const res  = await fetch('/api/products');
    const data = await res.json();

    // Populate category dropdown
    const catSel = document.getElementById('cat-select');
    (data.categories || []).forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat; opt.textContent = cat;
      catSel.appendChild(opt);
    });

    // Populate county dropdown
    const countySel = document.getElementById('county-select');
    (data.counties || []).forEach(county => {
      const opt = document.createElement('option');
      opt.value = county; opt.textContent = county;
      countySel.appendChild(opt);
    });

    // Render cards
    grid.innerHTML = '';
    (data.products || []).forEach(p => grid.appendChild(_renderProductCard(p)));
    _allCards = Array.from(grid.querySelectorAll('.product-card'));

    lucide.createIcons();
    applyFilters();

  } catch (err) {
    console.error('Failed to load products:', err);
    grid.innerHTML = '<div class="page-loading">Could not load products. Please refresh.</div>';
  }
}

/* ── Add to cart helper ───────────────────────────────────── */
function addToCart(productId, qtyInputId, btn) {
  const qty  = parseInt(document.getElementById(qtyInputId)?.value) || 1;
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i data-lucide="loader"></i>';
  lucide.createIcons();
  cartAdd(productId, qty).finally(() => {
    btn.innerHTML = orig;
    btn.disabled  = false;
    lucide.createIcons();
  });
}

/* ── Wire up filter controls ──────────────────────────────── */
document.getElementById('search-input').addEventListener('input',   applyFilters);
document.getElementById('cat-select').addEventListener('change',    applyFilters);
document.getElementById('county-select').addEventListener('change', applyFilters);
document.getElementById('avail-select').addEventListener('change',  applyFilters);
document.getElementById('sort-select').addEventListener('change',   applyFilters);

loadProducts();
</script>
{% endblock %}
